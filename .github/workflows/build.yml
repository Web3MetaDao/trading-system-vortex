name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            artifact_name: VORTEX Trading System
            asset_name: VORTEX Trading System-${{ github.ref_name }}.dmg
            build_cmd: npm run dist-mac
          - os: windows-latest
            artifact_name: VORTEX Trading System Setup
            asset_name: VORTEX Trading System Setup ${{ github.ref_name }}.exe
            build_cmd: npm run dist-win
          - os: ubuntu-latest
            artifact_name: VORTEX Trading System
            asset_name: VORTEX Trading System-${{ github.ref_name }}.AppImage
            build_cmd: npm run dist-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python3
          npm install
          pip install -r backend/requirements.txt

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          npm install
          pip install -r backend/requirements.txt

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev
          npm install
          pip install -r backend/requirements.txt

      - name: Build application
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v3
        with:
          name: macos-builds
          path: |
            out/VORTEX Trading System-*.dmg
            out/VORTEX Trading System-*.zip

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: windows-builds
          path: |
            out/VORTEX Trading System Setup *.exe
            out/VORTEX Trading System *.exe

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v3
        with:
          name: linux-builds
          path: |
            out/VORTEX Trading System-*.AppImage
            out/vortex-trading-system-*.deb

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/VORTEX Trading System-*.dmg
            out/VORTEX Trading System-*.zip
            out/VORTEX Trading System Setup *.exe
            out/VORTEX Trading System *.exe
            out/VORTEX Trading System-*.AppImage
            out/vortex-trading-system-*.deb
          draft: false
          prerelease: false
          body: |
            # VORTEX Trading System ${{ github.ref_name }}

            ## 🎉 新版本发布

            ### 📦 可执行文件
            - macOS: DMG 安装程序和 ZIP 便携版
            - Windows: Setup 安装程序和便携版 EXE
            - Linux: AppImage 和 DEB 包

            ### 📚 文档
            - [用户手册](https://github.com/Web3MetaDao/trading-system-vortex/blob/main/USER_MANUAL.md)
            - [部署指南](https://github.com/Web3MetaDao/trading-system-vortex/blob/main/DEPLOYMENT_GUIDE.md)
            - [发布说明](https://github.com/Web3MetaDao/trading-system-vortex/blob/main/RELEASE_NOTES.md)

            ### 🚀 快速开始
            1. 下载对应平台的可执行文件
            2. 安装应用
            3. 启动应用并进行初始化配置

            ### ⭐ 系统评级
            8.96/10 (A+ 等级)

            感谢您的支持！
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
