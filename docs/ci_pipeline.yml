name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          pip install ruff black isort mypy types-requests types-PyYAML

      - name: Run ruff (lint)
        run: ruff check src/ tests/ tools/ --select=F,E,W,B,I

      - name: Run black (format check)
        run: black --check src/ tests/ tools/

      - name: Run isort (import order check)
        run: isort --check-only src/ tests/ tools/

  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Run test suite
        run: |
          cd src
          python -m pytest ../tests/ -v --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: tests/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r src/ -ll -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md || echo "See CHANGELOG.md for details.")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create source distribution
        run: |
          pip install build
          python -m build --sdist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VORTEX Trading System ${{ steps.version.outputs.VERSION }}"
          body: |
            # VORTEX Trading System ${{ steps.version.outputs.VERSION }}

            ## What's New
            ${{ steps.changelog.outputs.NOTES }}

            ## Installation

            ```bash
            git clone https://github.com/Web3MetaDao/trading-system-vortex.git
            cd trading-system-vortex
            pip install -r requirements.txt
            cp .env.example .env  # Configure your API keys
            python src/startup.py
            ```

            ## Documentation
            - [Quick Start Guide](docs/quickstart.md)
            - [Configuration Reference](docs/configuration.md)
            - [Architecture Overview](docs/architecture.md)
            - [API Reference](docs/api.md)

            ## Performance (v2.0.0 Benchmarks)
            | Module | P50 Latency | P99 Latency | Throughput |
            |--------|-------------|-------------|------------|
            | SignalEngine | 0.289 ms | 1.020 ms | 1361 eval/s |
            | RiskEngine | 0.003 ms | 0.028 ms | — |
            | ChanlunEngine | 1.061 ms | 2.674 ms | — |

            **Test Suite: 190 passed, 0 failed**
          files: dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
